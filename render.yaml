services:
  - type: web
    name: team-task-manager-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: task-manager-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: task-manager-db
          property: password
      - key: JWT_SECRET
        value: mySecretKey123456789012345678901234567890

databases:
  - name: task-manager-db
    databaseName: taskmanager
    user: taskmanager
