services:
  - type: web
    name: team-task-manager-backend
    runtime: java
    rootDir: backend
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/backend-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: jdbcInternalConnectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: task-manager-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: task-manager-db
          property: password
      - key: JWT_SECRET
        value: mySecretKey123456789012345678901234567890

databases:
  - name: task-manager-db
    databaseName: taskmanager
    user: taskmanager
